# C- ctr | M- meta | S- shift
# bind prefix | bind -n global (no prefix) 

set -g terminal-features "tmux-256color:RGB"
set -ga terminal-overrides ",*:RGB"
set -g mouse on
set -g extended-keys on
set -g extended-keys-format csi-u
set -s escape-time 0
# set-clipboard is unreliable across terminals; skip OSC 52 for now
# set -g set-clipboard on

set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

# Start window numbering at 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# next/prev
bind -n M-Enter new-window
bind -n M-[ previous-window
bind -n M-] next-window

# Split panes
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# pane switching
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

bind -n M-H resize-pane -L 5
bind -n M-J resize-pane -D 5
bind -n M-K resize-pane -U 5
bind -n M-L resize-pane -R 5

bind -n M-d detach-client
bind -n M-X kill-session
bind -n M-q kill-window
bind -n M-x kill-pane

bind , command-prompt -I "#W" "rename-window '%%'"

bind r source-file ~/.config/tmux/tmux.conf \; display-message "config reloaded"

# === COPY MODE (vi keys) ===
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode v send -X begin-selection
bind -T copy-mode y send -X copy-selection-and-cancel
bind ] paste-buffer

# === FOCUS EVENTS (for Neovim FocusGained/FocusLost) ===
set -g focus-events on

# === DISPLAY TIMERS ===
set -g display-time 3000
set -g display-panes-time 4000

# === SYNCHRONIZE PANES TOGGLE ===
bind S setw synchronize-panes \; display-message "synchronize: #{?synchronize-panes,ON,OFF}"

# === FZF SESSION SWITCHER ===
bind C-f run "tmux list-sessions -F '#S' | fzf --prompt='session> ' | xargs tmux switch-client -t"

# === ROSE PINE THEME ===
set -g @rose_pine_variant 'main'
# set -g @rose_pine_host 'on'
# set -g @rose_pine_user 'on'
# set -g @rose_pine_directory 'on'
# set -g @rose_pine_date_time '%H:%M'
run '~/.config/tmux/plugins/rose-pine.tmux'

# === SELECTION COLOR (hot pink, overrides rose-pine default) ===
setw -g mode-style "bg=#ff69b4,fg=black"

setw -g automatic-rename on
